name: Deploy Chatweb to EC2

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/chatweb

            git -C chatweb-frontend pull origin main
            git -C chatweb-backend pull origin main

            docker compose down
            docker compose up -d --build
            docker image prune -f