name: Deploy Chatweb to EC2

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
          
            cd ~/chatweb
          
            git -C chatweb-frontend fetch origin main
            git -C chatweb-frontend reset --hard origin/main
          
            git -C chatweb-backend fetch origin main
            git -C chatweb-backend reset --hard origin/main
          
            docker compose build
            docker compose up -d
            docker image prune -f